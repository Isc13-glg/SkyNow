<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>World UV System</title>

<link rel="stylesheet" href="style.css"/>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
</head>

<body>

<div class="topbar">🌍 WORLD UV MONITORING SYSTEM</div>

<h3>User: Σκαπούλη Πετρούλλα</h3>

<div class="container">

  <p id="topOfDay"></p>

  <button id="startBtn">USE MY LOCATION</button>

  <p id="status">Waiting...</p>

  <div id="result" class="hidden">

    <h2 id="uvValue"></h2>
    <p id="message"></p>

    <div id="map"></div>

    <h3>🌍 Search Country</h3>
    <input id="countrySearch" placeholder="Type country..." />
    <ul id="countryList"></ul>

  </div>
</div>

<audio id="alarm" preload="auto">
  <source src="https://actions.google.com/sounds/v1/alarms/alarm_clock.ogg">
</audio>

<script src="script.js"></script>
</body>
</html>
