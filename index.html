<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Weather Pro App</title>

<link rel="stylesheet" href="style.css"/>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
</head>

<body>

<div class="bg"></div>

<div class="app">

  <div class="title">🌤 Weather Pro</div>

  <button id="startBtn">Get Weather</button>

  <div id="status">Tap to start</div>

  <div id="card" class="hidden">

    <div class="grid">

      <div class="box" id="temp">🌡️ --</div>
      <div class="box" id="uv">☀️ --</div>
      <div class="box" id="wind">💨 --</div>
      <div class="box" id="hum">💧 --</div>

    </div>

    <div id="msg"></div>

    <div id="map"></div>

  </div>

</div>

<audio id="alarm" src="https://actions.google.com/sounds/v1/alarms/alarm_clock.ogg"></audio>

<script src="script.js"></script>
</body>
</html>
